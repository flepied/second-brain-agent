---

version: '3.9'

networks:
  net:
    driver: bridge
services:
  server:
    image: chroma-local:sort
    build:
      context: ../chroma
    volumes:
      - $DSTDIR/Db:/data:z
    ports:
      - 8000:8000
    networks:
      - net
    environment:
      - IS_PERSISTENT=TRUE
      - ALLOW_RESET=TRUE

...
